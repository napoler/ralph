name: ralph-orchestration
description: |
  Ralph Orchestration Skill - 交互式任务编排技能
  
  分析用户任务描述，通过关键词匹配和 AI 分析自动选择最合适的 AI 工具，
  然后调用 ralph.sh 执行任务。支持交互式问答确认参数。
version: 1.0.0
author: Ralph Team
category: orchestration

defaults:
  tool: qwen
  max_iterations: 10
  load_balance: true

execution:
  ralph_path: auto
  log_level: info

# ralph.sh 路径候选列表（按顺序查找）
ralph_paths:
  - ~/.openclaw/workspace/ralph-fork/ralph.sh
  - ~/decentralized-box/ralph.sh
  - /mnt/data/dev/decentralized-box/ralph.sh
  - /mnt/data/dev/ralph-fork/ralph.sh

# 交互模式设置
interactive:
  enabled: true
  confirm_before_execute: true

# 日志设置
logging:
  level: info
  file: ~/.ralph/skill.log