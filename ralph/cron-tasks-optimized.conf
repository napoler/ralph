# ============================================
# Ralph Cron 任务配置 - 优化版
# 每个任务独立调度，直接调用 ralph.sh
# ============================================

# 环境变量
SHELL=/bin/bash
PATH=/home/terry/.npm-global/bin:/home/terry/.opencode/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

# ============================================
# Jules 综合任务管理（需要代理）
# 并行控制：目标 10 个，上限 15 个
# 自动回复阈值：20 次后触发合并
# ============================================

# Jules 综合管理器 - 每 30 分钟（检查回复、合并产出）
# 时间：12, 42 分（避开整点和半点高峰）
12,42 * * * * HTTP_PROXY="socks5://192.168.123.194:20170" HTTPS_PROXY="socks5://192.168.123.194:20170" cd /mnt/data/dev/decentralized-box && python3 tools/jules_integrated_manager.py --check-reply >> /mnt/data/dev/decentralized-box/logs/jules/cron-integrated-manager.log 2>&1

# Jules 本地任务提交 - 每 2 小时（工作时段）
# 时间：08:05, 10:05, 12:05, 14:05, 16:05, 18:05, 20:05（偏移 5 分钟避免冲突）
5 8,10,12,14,16,18,20 * * * HTTP_PROXY="socks5://192.168.123.194:20170" HTTPS_PROXY="socks5://192.168.123.194:20170" cd /mnt/data/dev/decentralized-box && python3 tools/jules_integrated_manager.py --submit-local >> /mnt/data/dev/decentralized-box/logs/jules/cron-local-submit.log 2>&1

# Jules 产出合并 - 每小时（自动检测完成后合并）
# 时间：25 分（避开其他 Jules 任务）
25 * * * * HTTP_PROXY="socks5://192.168.123.194:20170" HTTPS_PROXY="socks5://192.168.123.194:20170" cd /mnt/data/dev/decentralized-box && python3 tools/jules_integrated_manager.py --merge-output >> /mnt/data/dev/decentralized-box/logs/jules/cron-merge-output.log 2>&1

# Jules 任务状态检查 - 每 4 小时（工作时段）
# 时间：08:50, 12:50, 16:50, 20:50（低频检查，避免 API 限流）
50 8,12,16,20 * * * HTTP_PROXY="socks5://192.168.123.194:20170" HTTPS_PROXY="socks5://192.168.123.194:20170" cd /mnt/data/dev/decentralized-box && python3 tools/jules_task_analyzer.py >> /mnt/data/dev/decentralized-box/logs/jules/cron-task-analyzer.log 2>&1

# ============================================
# Jules + Claude 计划生成任务（需要代理）
# 每 2 小时分析项目状态，生成任务并提交 Jules 执行
# ============================================

# Jules + Claude 任务生成器 - 每 2 小时（工作时段）
# 时间：09:15, 11:15, 13:15, 15:15, 17:15, 19:15（偏移 15 分钟，避开 Jules 回复）
15 9,11,13,15,17,19 * * * HTTP_PROXY="socks5://192.168.123.194:20170" HTTPS_PROXY="socks5://192.168.123.194:20170" cd /mnt/data/dev/decentralized-box && python3 tools/jules_claude_task_submitter.py --auto-approve >> /mnt/data/dev/decentralized-box/logs/jules/cron-claude-planner.log 2>&1

# ============================================
# Jules 任务自动回复（需要代理）
# 每 30 分钟执行智能回复，使用状态缓存和执行验证
# 超过 20 次后自动触发合并到 dev 分支
# ============================================

# Jules 自动回复 - 每 30 分钟（智能模式）
# 时间：00, 30 分（保持原有频率，确保任务不中断）
0,30 * * * * HTTP_PROXY="socks5://192.168.123.194:20170" HTTPS_PROXY="socks5://192.168.123.194:20170" cd /mnt/data/dev/decentralized-box && /mnt/data/dev/decentralized-box/scripts/jules-auto-reply.sh >> /mnt/data/dev/decentralized-box/logs/jules/cron-jules-reply.log 2>&1

# ============================================
# 按工具类型划分的独立任务（不需要代理）
# 所有任务时间偏移，避免同时执行
# ============================================

# Claude Code (YOLO 模式) - 每 2 小时
# 时间：03 分
3 */2 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool claude --max 5 >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/claude.log 2>&1

# Opencode - 每 2 小时（偏移 15 分钟）
# 时间：18 分
18 */2 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool opencode --max 5 >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/opencode.log 2>&1

# Cline (Shell/Bash 任务) - 每 2 小时（偏移 30 分钟）
# 时间：33 分
33 */2 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool cline --max 5 >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/cline.log 2>&1

# Kilocode (交互式任务) - 每 3 小时
# 时间：48 分
48 */3 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool kilocode --max 5 >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/kilocode.log 2>&1

# Qwen (文本/代码生成) - 每 2 小时（偏移 45 分钟）
# 时间：48 分
48 */2 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool qwen --max 5 >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/qwen.log 2>&1

# Gemini (需要代理) - 每 2 小时（偏移 55 分钟）
# 时间：55 分
55 */2 * * * RALPH_PROXY="socks5://192.168.123.194:20170" cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool gemini --max 5 >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/gemini.log 2>&1

# ============================================
# 按任务类型划分的独立任务（不需要代理）
# ============================================

# 代码审查任务 - 每天 09:00
# 时间：09:05
5 9 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool opencode --task "审查代码质量和潜在问题" >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/review.log 2>&1

# Bug 修复任务 - 每 4 小时
# 时间：04 分
4 */4 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool claude --task "扫描并修复已知 bug" >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/bugfix.log 2>&1

# 功能开发任务 - 每 2 小时
# 时间：19 分
19 */2 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool opencode --task "实现待开发功能" >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/feature.log 2>&1

# 测试任务 - 每 6 小时
# 时间：34 分
34 */6 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool cline --task "运行测试并修复失败用例" >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/test.log 2>&1

# 文档任务 - 每天 14:00
# 时间：14:05
5 14 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool qwen --task "更新项目文档" >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/docs.log 2>&1

# ============================================
# 通用兜底任务（负载均衡模式）
# ============================================

# 每小时的第 40 分钟，使用负载均衡执行待处理任务
40 * * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --max 3 >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/general.log 2>&1

# ============================================
# 分支合并与 Git 维护
# ============================================

# 分支合并（工作时段每 30 分钟）
# 时间：05, 35 分
5,35 8-22 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool claude --max 3 "合并所有可合并的分支到主分支，解决冲突" >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/branch-merge.log 2>&1

# 工作树监控（每 30 分钟）
# 时间：20, 50 分
20,50 * * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool cline --max 2 "检查工作树状态，清理已完成的工作树" >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/worktree-monitor.log 2>&1

# ============================================
# 夜间维护任务（低频）
