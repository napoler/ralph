# 夜间合并：22:00-23:00 每 2 小时
0 22,23 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool claude --max 3 "合并分支，处理冲突" >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/night-merge.log 2>&1

# 夜间合并：00:00-06:00 每 2 小时
0 0,2,4,6 * * * cd /mnt/data/dev/decentralized-box/ralph && ./ralph.sh --tool claude --max 3 "合并分支，处理冲突" >> /mnt/data/dev/tmp/ralph-$(date +\%Y\%m\%d)/logs/night-merge.log 2>&1
