# Ralph 配置文件
# ============================================
# 所有路径和参数都可以在此配置
# 也可以通过环境变量覆盖
# ============================================

# ---------- 项目配置 ----------
# 项目目录 (可通过环境变量 RALPH_PROJECT_DIR 覆盖)
RALPH_PROJECT_DIR="${RALPH_PROJECT_DIR:-/mnt/data/dev/decentralized-box}"

# Ralph 脚本目录 (自动检测)
RALPH_SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

# ---------- 运行配置 ----------
# 默认 AI 工具 (可通过环境变量 RALPH_TOOL 覆盖)
# 可选: qwen, opencode, cline, kilocode, iflow, gemini
RALPH_TOOL="${RALPH_TOOL:-qwen}"

# 代理配置 (gemini 等工具需要)
# 格式: http://host:port 或 socks5://host:port
RALPH_PROXY="${RALPH_PROXY:-http://192.168.123.194:20171}"

# 默认最大迭代次数
RALPH_MAX_ITERATIONS="${RALPH_MAX_ITERATIONS:-10}"

# 任务完成信号 (可自定义)
RALPH_COMPLETE_SIGNAL="${RALPH_COMPLETE_SIGNAL:-<promise>COMPLETE</promise>}"

# ---------- 目录配置 ----------
# 日志目录
RALPH_LOG_DIR="${RALPH_LOG_DIR:-/mnt/data/dev/tmp/ralph-$(date +%Y%m%d)/logs}"

# 归档目录
RALPH_ARCHIVE_DIR="${RALPH_ARCHIVE_DIR:-$RALPH_SCRIPT_DIR/archive}"

# Specs 目录
RALPH_SPECS_DIR="${RALPH_SPECS_DIR:-$RALPH_SCRIPT_DIR/specs/active}"

# ---------- 工作树配置 ----------
# 工作树根目录
RALPH_WORKTREE_ROOT="${RALPH_WORKTREE_ROOT:-/mnt/data/dev/tmp}"

# 基础分支 (优先使用 dev, 其次 main)
RALPH_BASE_BRANCH="${RALPH_BASE_BRANCH:-dev}"

# ---------- AI 工具配置 ----------
# 可用的 AI 工具列表
RALPH_VALID_TOOLS=("qwen" "opencode" "cline" "kilocode" "iflow")

# AI 工具命令映射
declare -A RALPH_TOOL_COMMANDS
RALPH_TOOL_COMMANDS["qwen"]="qwen -p"
RALPH_TOOL_COMMANDS["opencode"]="opencode run --task"
RALPH_TOOL_COMMANDS["cline"]="cline"
RALPH_TOOL_COMMANDS["kilocode"]="kilocode run"
RALPH_TOOL_COMMANDS["iflow"]="iflow run --config"

# ---------- 负载均衡配置 ----------
# 是否启用负载均衡
RALPH_LOAD_BALANCE="${RALPH_LOAD_BALANCE:-true}"

# ---------- 任务类型映射 ----------
# 根据任务描述自动选择工具
declare -A RALPH_TASK_MAPPING
RALPH_TASK_MAPPING["shell"]="cline"
RALPH_TASK_MAPPING["bash"]="cline"
RALPH_TASK_MAPPING["script"]="cline"
RALPH_TASK_MAPPING["review"]="opencode"
RALPH_TASK_MAPPING["refactor"]="opencode"
RALPH_TASK_MAPPING["analyze"]="opencode"
RALPH_TASK_MAPPING["interactive"]="kilocode"
RALPH_TASK_MAPPING["tui"]="kilocode"
RALPH_TASK_MAPPING["project"]="kilocode"
RALPH_TASK_MAPPING["github"]="kilocode"
RALPH_TASK_MAPPING["pr"]="kilocode"
RALPH_TASK_MAPPING["workflow"]="iflow"
RALPH_TASK_MAPPING["pipeline"]="iflow"
RALPH_TASK_MAPPING["data"]="iflow"
RALPH_TASK_MAPPING["process"]="iflow"
RALPH_TASK_MAPPING["text"]="qwen"
RALPH_TASK_MAPPING["translate"]="qwen"
RALPH_TASK_MAPPING["summarize"]="qwen"
RALPH_TASK_MAPPING["write"]="qwen"
RALPH_TASK_MAPPING["code"]="qwen"
RALPH_TASK_MAPPING["implement"]="qwen"
RALPH_TASK_MAPPING["algorithm"]="qwen"
RALPH_TASK_MAPPING["bug"]="qwen"
RALPH_TASK_MAPPING["fix"]="qwen"
RALPH_TASK_MAPPING["default"]="qwen"

# ============================================
# 辅助函数
# ============================================

# 加载配置文件
ralph_load_config() {
    local config_file="$RALPH_SCRIPT_DIR/ralph.conf"
    
    if [ -f "$config_file" ]; then
        source "$config_file"
        echo "[RALPH] Loaded config from: $config_file"
    else
        echo "[RALPH] Using default config (no ralph.conf found)"
    fi
    
    # 环境变量覆盖配置文件
    [ -n "$RALPH_PROJECT_DIR" ] && PROJECT_DIR="$RALPH_PROJECT_DIR"
    [ -n "$RALPH_TOOL" ] && TOOL="$RALPH_TOOL"
    [ -n "$RALPH_MAX_ITERATIONS" ] && MAX_ITERATIONS="$RALPH_MAX_ITERATIONS"
}

# 获取工具当前负载 (运行中的进程数)
get_tool_load() {
    local tool="$1"
    pgrep -c -f "$tool" 2>/dev/null || echo 0
}

# 选择负载最低的工具 (负载均衡模式)
select_lightest_tool() {
    local min=999
    local chosen=""
    
    for tool in "${RALPH_VALID_TOOLS[@]}"; do
        local load=$(get_tool_load "$tool")
        if [[ $load -lt $min ]]; then
            min=$load
            chosen=$tool
        fi
    done
    
    echo "$chosen"
}

# 根据任务描述智能选择工具
select_tool_by_task() {
    local task="$1"
    local tool=""
    
    # 先尝试关键词匹配
    for key in "${!RALPH_TASK_MAPPING[@]}"; do
        if [[ "$task" =~ ($key) ]]; then
            tool="${RALPH_TASK_MAPPING[$key]}"
            break
        fi
    done
    
    # 如果没有匹配，使用负载均衡
    if [ -z "$tool" ]; then
        if [ "$RALPH_LOAD_BALANCE" = "true" ]; then
            tool=$(select_lightest_tool)
        else
            tool="$RALPH_TOOL"
        fi
    fi
    
    echo "$tool"
}

# 执行 AI 任务
ralph_execute_task() {
    local tool="$1"
    local task="$2"
    local log_file="$3"
    
    local cmd="${RALPH_TOOL_COMMANDS[$tool]}"
    
    case "$tool" in
        qwen)
            echo "$cmd \"$task\"" | bash 2>&1 | tee -a "$log_file"
            ;;
        opencode)
            $cmd="$task" 2>&1 | tee -a "$log_file"
            ;;
        cline)
            $cmd "$task" 2>&1 | tee -a "$log_file"
            ;;
        kilocode)
            $cmd "$task" 2>&1 | tee -a "$log_file"
            ;;
        iflow)
            $cmd="$task" 2>&1 | tee -a "$log_file"
            ;;
    esac
}